title: Douyin Downloader Refactored
host: 127.0.0.1
port: 9000
cors_origins:
  - http://127.0.0.1:9000
  - http://localhost:9000
security:
  app_env: development
  invite_auth_enabled: true
  session_secret: replace-with-at-least-32-random-characters
  invite_codes:
    - change-me-invite-code
  admin_user: admin
  admin_password: change-me-admin-password
  # Optional shared admin dashboard; /admin and /admin/login redirect here.
  admin_external_url: ""
  trust_proxy_headers: false
  trusted_proxy_cidrs: []
  secure_cookies: false
resources:
  parse_concurrency: 4
  download_concurrency: 2
  stream_concurrency: 8
  max_request_url_length: 4096
  max_stream_bytes: 1073741824
  max_download_bytes: 1073741824
  request_timeout_seconds: 30
  stream_read_timeout_seconds: 300
  max_redirects: 5
  # Cache successful parse metadata for 10 minutes.
  metadata_cache_ttl_seconds: 600
  metadata_cache_max_entries: 500
  # Smart preload only downloads small ordinary videos in the background.
  preload_enabled: true
  preload_platforms:
    - douyin
  preload_max_duration_seconds: 180
  preload_max_bytes: 104857600
  preload_cache_max_bytes: 536870912
  preload_cache_max_entries: 20
  preload_concurrency: 1
  preload_wait_seconds: 2.0
  # Set to 0 when a legacy deployment owns the shared record file.
  records_max_file_bytes: 20971520
  f2_prewarm_enabled: true
api:
  enabled: true
  timeout: 15
  fallback_to_crawler: false
cookies:
  # Copy one or more current Douyin web cookies into the private config.yaml.
  douyin: []
network:
  # Optional HTTP proxy used only by TikTok and X/Twitter.
  proxy: ""
paths:
  data_dir: var
  downloads_dir: var/downloads
  logs_dir: var/logs
  records_file: null
