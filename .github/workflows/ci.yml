name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DOUYIN_F2_PREWARM_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements-dev.txt
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy src
      - run: pytest
      - run: DOUYIN_SESSION_SECRET=ci-session-secret-ci-session-secret DOUYIN_INVITE_CODES=ci PYTHONPATH=src python -c "from app.main import app; print(app.title)"
